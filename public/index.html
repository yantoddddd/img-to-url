<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageVault | Upload & Get Direct Link</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0c15 0%, #0f1119 100%);
            font-family: 'Inter', sans-serif;
            color: #eef5ff;
            min-height: 100vh;
            padding: 1.5rem;
        }
        .container { max-width: 700px; margin: 0 auto; }
        
        /* Header */
        .header {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            padding: 1rem 1.8rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            margin-bottom: 0.5rem;
        }
        .header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #94a3f8);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .header p {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 0.3rem;
        }
        
        /* Card */
        .card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 1.8rem;
        }
        .card-body { padding: 1.8rem; }
        
        /* Upload zone */
        .upload-zone {
            background: rgba(5, 10, 25, 0.5);
            border: 2px dashed rgba(59, 130, 246, 0.4);
            border-radius: 1.2rem;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
            margin-bottom: 1.2rem;
        }
        .upload-zone:hover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
        .upload-icon { font-size: 2.5rem; color: #60a5fa; margin-bottom: 0.5rem; }
        
        /* Preview */
        .preview-area { display: none; text-align: center; margin-bottom: 1rem; }
        .preview-img { max-width: 100%; max-height: 200px; border-radius: 0.8rem; }
        .preview-info { font-size: 0.7rem; color: #94a3b8; margin-top: 0.5rem; }
        
        /* Buttons */
        .btn {
            padding: 0.8rem;
            border-radius: 0.8rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            width: 100%;
        }
        .btn-primary {
            background: linear-gradient(95deg, #2563eb, #4f46e5);
            color: white;
        }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary {
            background: rgba(30, 41, 59, 0.8);
            color: #cbd5e1;
            margin-top: 0.5rem;
        }
        
        /* Result */
        .result-box {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 1rem;
            padding: 1.2rem;
            margin-top: 1.5rem;
            display: none;
            border-left: 3px solid #10b981;
        }
        .result-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #10b981;
            margin-bottom: 0.5rem;
        }
        .result-link {
            background: #020617;
            padding: 0.8rem;
            border-radius: 0.6rem;
            font-family: monospace;
            font-size: 0.7rem;
            word-break: break-all;
            margin: 0.5rem 0;
        }
        .copy-btn {
            background: #1e293b;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            color: white;
            font-size: 0.8rem;
            cursor: pointer;
            width: auto;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            padding: 0.6rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 1000;
        }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo-icon"><i class="fas fa-cloud-upload-alt"></i></div>
        <h1>ImageVault</h1>
        <p>Upload gambar • Dapatkan direct link berkualitas</p>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="upload-zone" id="uploadZone">
                <div class="upload-icon"><i class="fas fa-images"></i></div>
                <div>Klik atau tarik gambar ke sini</div>
                <small style="color:#64748b;">JPEG, PNG, WEBP, GIF · Max 16 MB</small>
                <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none">
            </div>

            <div class="preview-area" id="previewArea">
                <img id="previewImg" class="preview-img" alt="preview">
                <div class="preview-info" id="previewInfo"></div>
            </div>

            <button class="btn btn-primary" id="uploadBtn" disabled>
                <i class="fas fa-arrow-up"></i> Upload & Dapatkan Link
            </button>
            <button class="btn btn-secondary" id="resetBtn" style="display:none;">
                <i class="fas fa-sync-alt"></i> Hapus & Upload Ulang
            </button>

            <div class="result-box" id="resultBox">
                <div class="result-label">
                    <i class="fas fa-link"></i> DIRECT LINK (BERKUALITAS)
                </div>
                <div class="result-link" id="resultLink"></div>
                <button class="copy-btn" id="copyBtn">
                    <i class="far fa-copy"></i> Salin Link
                </button>
                <div style="font-size:0.6rem; color:#60a5fa; margin-top:0.5rem;">
                    <i class="fas fa-check-circle"></i> Link siap dipakai di mana saja
                </div>
            </div>
        </div>
    </div>
</div>
<div id="toastMsg" class="toast"></div>

<script>
    const API_BASE = '/api';
    let currentFile = null;
    let currentDirectUrl = null;

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.style.background = isError ? '#7f1a1a' : '#1e293b';
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2500);
    }

    function handleFile(file) {
        if (!file) return;
        const allowed = ['image/jpeg', 'image/png', 'image/webp', 'image/gif'];
        if (!allowed.includes(file.type)) {
            showToast('Format tidak didukung', true);
            return;
        }
        if (file.size > 16 * 1024 * 1024) {
            showToast('Ukuran maksimal 16MB', true);
            return;
        }
        currentFile = file;
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('previewImg').src = e.target.result;
            document.getElementById('previewInfo').innerHTML = `<i class="far fa-file-image"></i> ${file.name} · ${(file.size/1024).toFixed(1)} KB`;
            document.getElementById('previewArea').style.display = 'block';
            document.getElementById('uploadBtn').disabled = false;
            document.getElementById('resetBtn').style.display = 'block';
            document.getElementById('resultBox').style.display = 'none';
        };
        reader.readAsDataURL(file);
    }

    async function uploadImage(file) {
        const formData = new FormData();
        formData.append('image', file);
        const response = await fetch(`${API_BASE}/upload`, { method: 'POST', body: formData });
        return await response.json();
    }

    document.getElementById('uploadBtn').addEventListener('click', async () => {
        if (!currentFile) return;
        const btn = document.getElementById('uploadBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Uploading...';
        try {
            const result = await uploadImage(currentFile);
            if (result.success) {
                currentDirectUrl = result.url;
                document.getElementById('resultLink').innerText = currentDirectUrl;
                document.getElementById('resultBox').style.display = 'block';
                showToast('Upload berhasil!');
            } else {
                showToast(result.error || 'Upload gagal', true);
            }
        } catch (err) {
            showToast('Error koneksi', true);
        } finally {
            btn.innerHTML = '<i class="fas fa-arrow-up"></i> Upload & Dapatkan Link';
            btn.disabled = false;
        }
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
        currentFile = null;
        document.getElementById('fileInput').value = '';
        document.getElementById('previewArea').style.display = 'none';
        document.getElementById('previewImg').src = '';
        document.getElementById('uploadBtn').disabled = true;
        document.getElementById('resetBtn').style.display = 'none';
        document.getElementById('resultBox').style.display = 'none';
        showToast('Siap upload gambar baru');
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
        const link = document.getElementById('resultLink').innerText;
        if (link) {
            navigator.clipboard.writeText(link);
            showToast('Link tersalin!');
        }
    });

    // Drag & drop
    const zone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    zone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        if (e.target.files[0]) handleFile(e.target.files[0]);
    });
    zone.addEventListener('dragover', (e) => e.preventDefault());
    zone.addEventListener('drop', (e) => {
        e.preventDefault();
        if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });
</script>
</body>
</html>
